<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floods Prediction - Form</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <div class="navbar">
        <span class="logo">Floods Prediction</span>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/" class="active">Predict Floods</a>
        </div>
    </div>

    <div class="form-container">
        <form action="/predict" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Cloud Cover</label>
                    <input type="number" step="any" name="cloud_cover" placeholder="Cloud Cover Percentage (%)" required>
                </div>
                <div class="form-group">
                    <label>Annual Rain Fall</label>
                    <input type="number" step="any" name="annual_fallback" placeholder="Enter Annual Rain Fall in mm" required>
                </div>
                <div class="form-group">
                    <label>Jan-Feb Rainfall</label>
                    <input type="number" step="any" name="jan_feb" placeholder="Jan-Feb Rainfall in mm" required>
                </div>
                <div class="form-group">
                    <label>March-May Rainfall</label>
                    <input type="number" step="any" name="mar_may" placeholder="March-May Rainfall in mm" required>
                </div>
                <div class="form-group">
                    <label>June-September</label>
                    <input type="number" step="any" name="jun_sep" placeholder="June-September Rainfall in mm" required>
                </div>
            </div>
            <button type="submit" class="btn-predict">Predict</button>
        </form>
    </div>
</body>
</html>
